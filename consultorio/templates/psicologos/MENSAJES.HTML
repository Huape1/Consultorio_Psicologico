{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Mensajes</title>
    <link rel="stylesheet" href="{% static '/css/psicologos.css' %}">
</head>

<body>

    <div class="layout">

        <aside class="sidebar">
            <h2 class="logo">FYM</h2>
            <a href="/panel" class="menu">Panel principal</a>
            <a href="/agendas" class="menu">Agendas</a>
            <a href="/mensajes" class="menu active">Mensajes</a>
            <a href="/cuenta" class="menu">Cuenta</a>
            <a href="/" class="menu">Cerrar sesión</a>
        </aside>

        <main class="main">
            <div class="chat-layout">
            
                <!-- Lista de usuarios -->
                <div class="chat-users">
                    <h3>Mensajes</h3>
                    <ul>
                        <li class="active-user">María Gómez</li>
                        <li>Carlos Ruiz</li>
                        <li>Ana López</li>
                    </ul>
                </div>
            
                <!-- Conversación -->
                <div class="chat-box">
                    <div class="chat-header">
                        Chat con María Gómez
                    </div>
            
                    <div class="chat-messages">
                        <div class="message received">
                            Hola doctor, he tenido ansiedad esta semana.
                        </div>
            
                        <div class="message sent">
                            Gracias por comentarlo, lo trabajamos en la sesión.
                        </div>
                    </div>
            
                    <div class="chat-input">
                        <input type="text" placeholder="Escribe un mensaje...">
                        <button>Enviar</button>
                    </div>
                </div>
            
            </div>

        </main>
    </div>
</body>

</html>
